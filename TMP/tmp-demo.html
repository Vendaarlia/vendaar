<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Pinned Slider Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Georgia, serif;
      overflow-x: hidden;
    }

    /* ── BEFORE #work ── */
    #before {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #444;
    }

    /* ── WORK SECTION ── */
    #work {
      position: relative;
    }

    .work-slider-container {
      width: 100%;
    }

    .work-slide {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    .work-slide.scroll-work {
      position: relative;
    }

    /* 3D stack */
    .card-3d-img-slider {
      position: relative;
      width: 400px;
      height: 400px;
      transform: rotateX(20deg) rotateY(-10deg) rotateZ(130deg);
      border-radius: 12px;
      overflow: hidden;
      margin: -300px 0;
      transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1);
      cursor: pointer;
      background-color: rgb(26, 26, 26);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card-3d-img-slider:hover {
      transform: rotateX(20deg) rotateY(-10deg) rotateZ(130deg) translateX(30%);
    }

    .card-3d-img-slider .card-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      opacity: 0.3;
      transition: 1s cubic-bezier(0.075, 0.82, 0.165, 1);
    }

    .card-3d-img-slider:hover .card-inner {
      opacity: 1;
    }

    /* warna tiap card */
    .work-slide:nth-child(1) .card-3d-img-slider { background: #1a1a2e; }
    .work-slide:nth-child(2) .card-3d-img-slider { background: #16213e; }
    .work-slide:nth-child(3) .card-3d-img-slider { background: #0f3460; }
    .work-slide:nth-child(4) .card-3d-img-slider { background: #533483; }
    .work-slide:nth-child(5) .card-3d-img-slider { background: #2b2d42; }

    /* ── AFTER #work ── */
    #after {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #444;
    }
  </style>
</head>
<body>

  <section id="before">
    ↓ scroll to work section
  </section>

  <section id="work">
    <div class="work-slider-container">

      <div class="work-slide pinned-work">
        <div class="card-3d-img-slider">
          <div class="card-inner">01</div>
        </div>
      </div>

      <div class="work-slide pinned-work">
        <div class="card-3d-img-slider">
          <div class="card-inner">02</div>
        </div>
      </div>

      <div class="work-slide pinned-work">
        <div class="card-3d-img-slider">
          <div class="card-inner">03</div>
        </div>
      </div>

      <div class="work-slide pinned-work">
        <div class="card-3d-img-slider">
          <div class="card-inner">04</div>
        </div>
      </div>

      <!-- last card: tidak di-pin -->
      <div class="work-slide scroll-work">
        <div class="card-3d-img-slider">
          <div class="card-inner">05</div>
        </div>
      </div>

    </div>
  </section>

  <section id="after">
    next section ↓
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    document.addEventListener("DOMContentLoaded", function () {
      const lastCard = document.querySelector("#work .scroll-work");
      const pinnedCards = gsap.utils.toArray("#work .pinned-work");

      pinnedCards.forEach((slide, index, slides) => {
        const nextSlide = slides[index + 1] || lastCard;
        const isLast = index === slides.length - 1;

        gsap.to(slide, {
          scrollTrigger: {
            trigger: slide,
            start: "top top",
            end: isLast ? "+=1" : `+=${nextSlide.offsetTop - slide.offsetTop}`,
            pin: true,
            pinSpacing: false,
            scrub: 1,
          },
        });
      });
    });
  </script>

</body>
</html>
